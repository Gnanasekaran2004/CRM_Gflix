spring.application.name=pulsestream
server.port=8080

# ==========================================
# DATABASE — H2 In-Memory (Development)
# ==========================================
spring.datasource.url=jdbc:h2:mem:pulsestream;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=PulseStreamSuperSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmUsed2024
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ==========================================
# Logging
# ==========================================
logging.level.com.pulsestream=INFO
logging.level.org.springframework.security=WARN
